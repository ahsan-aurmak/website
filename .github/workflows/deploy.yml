name: Push to Deploy (AURMAK Live)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Open codebase
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm run build

      - name: Inject SMTP Config (Zero-Upload System)
        env:
          CONFIG_DATA: ${{ secrets.SMTP_CONFIG_CONTENT }}
        run: |
          echo "$CONFIG_DATA" > dist/smtp_config.php

      - name: Deploy to Hestia Server (Strict SFTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 88.208.255.166
          username: webuser
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /web/aurmak.com/public_html/
