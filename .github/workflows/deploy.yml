name: Push to Deploy (AURMAK Live)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Open codebase
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm run build

      - name: Prepare Assets
        run: |
          cp migration_package/api.php dist/api.php
          cp migration_package/.htaccess dist/.htaccess

      - name: Deploy to Hestia Server (Pure SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: 88.208.255.166
          username: webuser
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          local_path: './dist/'
          # Using the full absolute path to avoid "550" errors
          remote_path: '/home/webuser/web/aurmak.com/public_html/'
          sftp_only: true
          delete_remote_files: false
