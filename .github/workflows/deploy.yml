name: Push to Deploy (AURMAK Live)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Open codebase
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm run build

      - name: Prepare Assets
        run: |
          cp migration_package/api.php dist/api.php
          cp migration_package/.htaccess dist/.htaccess

      - name: Deploy to Hestia Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 88.208.255.166
          username: webuser
          password: ${{ secrets.DEPLOY_PASSWORD }}
          server-dir: web/aurmak.com/public_html/
          local-dir: ./dist/
          protocol: ftp
          port: 21
